name: Realtor Outreach Claude Routine

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke sends 3; production sends CSV count"
        required: true
        default: smoke
        type: choice
        options:
          - dry-run
          - smoke
          - production
      recipient_csv:
        description: "CSV path in repo"
        required: true
        default: data/github_realtor_smoke_test_3.csv
      expected_count:
        description: "Hard recipient count gate"
        required: true
        default: "3"
      send_delay_seconds:
        description: "Delay between sends"
        required: true
        default: "24"
  schedule:
    # 7:00 AM America/Los_Angeles on 2026-06-17 is 14:00 UTC.
    # Keep guarded by the date check below so this cannot recur accidentally.
    - cron: "0 14 17 6 *"

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  realtor-outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: realtor-outreach-20260617
      cancel-in-progress: false

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Resolve mode and guards
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            # One-day scheduled production trigger. Abort on any other date.
            test "$(TZ=America/Los_Angeles date +%Y-%m-%d)" = "2026-06-17"
            echo "mode=production" >> "$GITHUB_OUTPUT"
            echo "recipient_csv=data/github_realtor_production_450.csv" >> "$GITHUB_OUTPUT"
            echo "expected_count=450" >> "$GITHUB_OUTPUT"
            echo "dry_run=0" >> "$GITHUB_OUTPUT"
            echo "delay=24" >> "$GITHUB_OUTPUT"
          else
            mode="${{ inputs.mode }}"
            echo "mode=$mode" >> "$GITHUB_OUTPUT"
            echo "recipient_csv=${{ inputs.recipient_csv }}" >> "$GITHUB_OUTPUT"
            echo "expected_count=${{ inputs.expected_count }}" >> "$GITHUB_OUTPUT"
            echo "delay=${{ inputs.send_delay_seconds }}" >> "$GITHUB_OUTPUT"
            if [[ "$mode" == "dry-run" ]]; then echo "dry_run=1" >> "$GITHUB_OUTPUT"; else echo "dry_run=0" >> "$GITHUB_OUTPUT"; fi
          fi

      - name: Preflight CSV exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ steps.cfg.outputs.recipient_csv }}"
          python3 - <<'PY'
          import csv, os, sys
          path=os.environ['CSV']; expected=int(os.environ['EXPECTED'])
          with open(path, newline='', encoding='utf-8-sig') as f:
              rows=list(csv.DictReader(f))
          emails=[(r.get('email') or '').strip().lower() for r in rows]
          assert len(rows)==expected, (len(rows), expected)
          assert all(emails)
          assert len(set(emails))==len(emails)
          print({'csv': path, 'rows': len(rows), 'unique_emails': len(set(emails))})
          PY
        env:
          CSV: ${{ steps.cfg.outputs.recipient_csv }}
          EXPECTED: ${{ steps.cfg.outputs.expected_count }}

      - name: Send via Outlook Graph
        shell: bash
        env:
          OUTLOOK_TOKEN_JSON: ${{ secrets.OUTLOOK_TOKEN_JSON }}
          OUTLOOK_CLIENT_ID: ${{ secrets.OUTLOOK_CLIENT_ID }}
          OUTLOOK_TENANT_ID: ${{ secrets.OUTLOOK_TENANT_ID }}
          MODE: ${{ steps.cfg.outputs.mode }}
          RECIPIENT_CSV: ${{ steps.cfg.outputs.recipient_csv }}
          EXPECTED_COUNT: ${{ steps.cfg.outputs.expected_count }}
          DRY_RUN: ${{ steps.cfg.outputs.dry_run }}
          SEND_DELAY_SECONDS: ${{ steps.cfg.outputs.delay }}
        run: |
          set -euo pipefail
          python3 scripts/github_realtor_outreach_sender.py
